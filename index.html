<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Miner – Dev HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- STARS BG -->
  <canvas id="stars"></canvas>

  <!-- LOGIN -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="planet-icon">
          <div class="planet-ring"></div>
        </div>
        <h1>Planet Miner</h1>
        <span class="login-badge">DEV HQ</span>
      </div>
      <form id="login-form" autocomplete="off">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username..." autofocus>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password...">
        </div>
        <button type="submit" class="btn-login">
          <span>Launch</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <div id="login-error" class="login-error"></div>
      </form>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="app hidden">
    <!-- NAV -->
    <nav class="topbar">
      <div class="topbar-left">
        <div class="nav-planet"></div>
        <span class="nav-title">Planet Miner</span>
        <span class="nav-badge">DEV HQ</span>
      </div>
      <div class="topbar-right">
        <a href="office.html" class="btn-office" style="font-size:0.8rem;padding:6px 14px;border-radius:10px;background:rgba(167,139,250,0.15);color:#a78bfa;text-decoration:none;border:1px solid rgba(167,139,250,0.3);font-weight:600;transition:all 0.2s" onmouseover="this.style.background='rgba(167,139,250,0.25)'" onmouseout="this.style.background='rgba(167,139,250,0.15)'">Agent Office</a>
        <span class="user-pill" id="user-pill"></span>
        <button class="btn-logout" id="btn-logout">Logout</button>
      </div>
    </nav>

    <!-- TABS -->
    <div class="tab-bar" id="tab-bar"></div>

    <!-- CONTENT -->
    <main class="content" id="content"></main>
  </div>

  <!-- TICKET MODAL -->
  <div id="ticket-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title">Ticket</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCs2wm0VNWRwYLVF06nsp_CbyKL1YV_sWw",
      authDomain: "roblox-404d7.firebaseapp.com",
      projectId: "roblox-404d7",
      storageBucket: "roblox-404d7.firebasestorage.app",
      messagingSenderId: "522618361608",
      appId: "1:522618361608:web:5b6cb2c47f538f054bbebd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>
  <script src="app.js"></script>
</body>
</html>
